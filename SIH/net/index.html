<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Image Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cosmic Upload</h1>
    </header>
    <main>
        <div class="upload-container">
            <input type="file" id="fileInput" accept="image/*">
            <div id="dropZone">Drag your image here or click to select</div>
            <img id="preview" src="" alt="Image Preview">
        </div>
    </main>
    <footer>
        <p>Made with love in the galaxy</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
